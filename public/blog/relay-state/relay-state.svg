<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Three isolated subapp bundles kept in sync through a shared window relay">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- subapp bundles -->
  <g font-family="Roboto, Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle">
    <rect x="60" y="70" width="130" height="80" rx="8" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="125" y="105" fill="#e2e8f0" font-weight="bold">nav</text>
    <text x="125" y="130" fill="#94a3b8" font-size="12">bundle</text>

    <rect x="235" y="70" width="130" height="80" rx="8" fill="#334155" stroke="#64748b" stroke-width="2"/>
    <text x="300" y="105" fill="#e2e8f0" font-weight="bold">subapp</text>
    <text x="300" y="130" fill="#94a3b8" font-size="12">bundle</text>

    <rect x="410" y="70" width="130" height="80" rx="8" fill="#334155" stroke="#0d9488" stroke-width="2"/>
    <text x="475" y="105" fill="#e2e8f0" font-weight="bold">agent</text>
    <text x="475" y="130" fill="#94a3b8" font-size="12">bundle</text>
  </g>

  <!-- relay lines -->
  <g stroke="#0d9488" stroke-width="2.5" stroke-dasharray="6 6">
    <line x1="125" y1="150" x2="125" y2="265"/>
    <line x1="300" y1="150" x2="300" y2="265"/>
    <line x1="475" y1="150" x2="475" y2="265"/>
  </g>
  <g fill="#2dd4bf">
    <circle cx="125" cy="200" r="5"/>
    <circle cx="300" cy="228" r="5"/>
    <circle cx="475" cy="185" r="5"/>
  </g>

  <!-- shared window bus -->
  <rect x="60" y="265" width="480" height="70" rx="8" fill="#134e4a" stroke="#0d9488" stroke-width="2"/>
  <g font-family="Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="300" y="296" fill="#5eead4" font-size="18" font-weight="bold">window</text>
    <text x="300" y="320" fill="#99f6e4" font-size="13">one per tab &#183; relay-state</text>
  </g>
</svg>
